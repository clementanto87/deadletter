name: Build and Push to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: deadletter
  IMAGE_TAG: ${{ github.sha }}
  ACR_LOGIN_SERVER: acrmyappdev.azurecr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew --version
          ./gradlew build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          AAD_TOKEN=$(az account get-access-token \
            --resource https://containerregistry.azure.net \
            --query accessToken -o tsv)

          REFRESH_TOKEN=$(curl -s -X POST \
            "https://${{ env.ACR_LOGIN_SERVER }}/oauth2/exchange" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=access_token" \
            -d "service=${{ env.ACR_LOGIN_SERVER }}" \
            -d "access_token=$AAD_TOKEN" \
            | jq -r '.refresh_token')

          echo "$REFRESH_TOKEN" | docker login ${{ env.ACR_LOGIN_SERVER }} \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: myapp
          resourceGroup: rg-myapp-dev
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Logout from ACR
        if: always()
        run: docker logout ${{ env.ACR_LOGIN_SERVER }}

      - name: Summary
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${{ env.ACR_LOGIN_SERVER }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container App | myapp |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | rg-myapp-dev |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
